<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>

  <div class="container"></div>

  <script src="https://unpkg.com/supersimpledev@8.6.4/react.js"> </script>
  <script src="https://unpkg.com/supersimpledev@8.6.4/react-dom.js"> </script>

  <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel">

    function LoginForm() {
      return (
        <>
          <p>Welcome to my website</p>
          <input placeholder="Email" size="30" />
          <input placeholder="Password" type="password" size="30" />
          <br />
          <button>Login</button>
          <button>SignUp</button>
        </>
      )
    }




    function Welcome() {
      return (
        <>
          <p>Welcome to my website</p>
          <input placeholder="Email" size="30" />
          <input placeholder="Password" type="password" size="30" />
          <br />
          <button>Login</button>
          <button>SignUp</button>
        </>
      )
    }

    function App() {
      return (
        <>
          <Welcome />
          <LoginForm />
        </>
      )
    }


    const container = document.querySelector('.container');

    ReactDOM.createRoot(container).render(<App />);</script>

</body>

</html>
