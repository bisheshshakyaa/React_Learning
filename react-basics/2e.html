    function ProductDetails({ price, name, discountPrice, imageSrc }) {

      return (
        <div>
          <img src={imageSrc} width="250" />
          <p>Product Name:{name}</p>
          {discountPrice ? (
            <>
              <p><del>Price: {price}</del></p>
              <p>
                Discount Price:{discountPrice}
              </p>
            </>
          )
            :
            (
              <p>Price: {price}</p>
            )
          }

          <button>Add to Cart</button>
          <br />
        </div>
      )
    }


    function App() {
      return (
        <>
          <ProductDetails
            name="Cotton Socks"
            price="$10.90"
            discountPrice="$5.45"
            imageSrc="/cotton-socks.png"

          <ProductDetails

          <ProductDetails

            price="$10.00"
            imageSrc="/VG.jpg"
          />
        </>
      )
    }


    const gap_holding = document.querySelector('.hold');


    ReactDOM.createRoot(gap_holding).render(<App />);
