<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>

  <div class="container "></div>
  <div class="placer"></div>

  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel">

    function PressBtn({ count, setCount }) {

      function increaseCount() {
        setCount(count + 1)

      }
      return (
        <>
          <button onClick={increaseCount}> You have clicked me {count} {count >= 1 ? 'times' : 'time'}</button>
        </>
      )
    }

    function App() {
      const [count, setCount] = React.useState(0)

      return (
        <>
          < PressBtn
            count={count}
            setCount={setCount}
          />
          < PressBtn
            count={count}
            setCount={setCount}
          />
        </>
      )

    }




    const Holder = document.querySelector('.placer');

    ReactDOM.createRoot(Holder).render(<App />)


  </script>
</body>

</html>
